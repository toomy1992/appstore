version: '3'
services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:0.60.3
    ports:
      - ${APP_PORT}:4533
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
      PUID: "1000"
      PGID: "1000"
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: "${NAVIDROME_LOGLEVEL:-info}"
      ND_SESSIONTIMEOUT: "${NAVIDROME_SESSIONTIMEOUT:-48h}"
      ND_BASEURL: "${NAVIDROME_BASEURL}"
      ND_ENABLEARTWORKPRECACHE: "${NAVIDROME_ENABLEARTWORKPRECACHE:-true}"
      ND_ENABLEUSEREDITING: "${NAVIDROME_ENABLEUSEREDITING:-true}"
      ND_ENABLEDOWNLOADS: "${NAVIDROME_ENABLEDOWNLOADS:-true}"
      ND_ENABLESHARING: "${NAVIDROME_ENABLESHARING:-false}"
      ND_ENABLETRANSCODINGCONFIG: "${NAVIDROME_ENABLETRANSCODINGCONFIG:-false}"
      ND_ENABLEFAVOURITES: "${NAVIDROME_ENABLEFAVOURITES:-true}"
      ND_ENABLENOWPLAYING: "${NAVIDROME_ENABLENOWPLAYING:-true}"
      ND_ENABLESCROBBLEHISTORY: "${NAVIDROME_ENABLESCROBBLEHISTORY:-true}"
      ND_ENABLESTARRATING: "${NAVIDROME_ENABLESTARRATING:-true}"
      ND_ENABLEINSIGHTSCOLLECTOR: "${NAVIDROME_ENABLEINSIGHTSCOLLECTOR:-true}"
      ND_LASTFM_ENABLED: "${NAVIDROME_LASTFM_ENABLED:-true}"
      ND_SPOTIFY_ENABLED: "${NAVIDROME_SPOTIFY_ENABLED:-false}"
      ND_SPOTIFY_ID: "${NAVIDROME_SPOTIFY_ID}"
      ND_SPOTIFY_SECRET: "${NAVIDROME_SPOTIFY_SECRET}"
      ND_DEEZER_ENABLED: "${NAVIDROME_DEEZER_ENABLED:-true}"
      ND_LISTENBRAINZ_ENABLED: "${NAVIDROME_LISTENBRAINZ_ENABLED:-true}"
      ND_ENABLEREPLAYGAIN: "${NAVIDROME_ENABLEREPLAYGAIN:-true}"
      ND_TRANSCODINGCACHESIZE: "${NAVIDROME_TRANSCODINGCACHESIZE:-100MB}"
      ND_IMAGECACHESIZE: "${NAVIDROME_IMAGECACHESIZE:-100MB}"
    volumes:
      - ${APP_DATA_DIR}/navidrome/data:/data
      - ${ROOT_FOLDER_HOST}/media/data/music:/music:ro
    networks:
      - tipi_main_network
    labels:
      traefik.enable: true
      traefik.http.middlewares.navidrome-web-redirect.redirectscheme.scheme: https
      traefik.http.services.navidrome.loadbalancer.server.port: 4533
      traefik.http.routers.navidrome-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.navidrome-insecure.entrypoints: web
      traefik.http.routers.navidrome-insecure.service: navidrome
      traefik.http.routers.navidrome-insecure.middlewares: navidrome-web-redirect
      traefik.http.routers.navidrome.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.navidrome.entrypoints: websecure
      traefik.http.routers.navidrome.service: navidrome
      traefik.http.routers.navidrome.tls.certresolver: myresolver
      traefik.http.routers.navidrome-local-insecure.rule: Host(`navidrome.${LOCAL_DOMAIN}`)
      traefik.http.routers.navidrome-local-insecure.entrypoints: web
      traefik.http.routers.navidrome-local-insecure.service: navidrome
      traefik.http.routers.navidrome-local-insecure.middlewares: navidrome-web-redirect
      traefik.http.routers.navidrome-local.rule: Host(`navidrome.${LOCAL_DOMAIN}`)
      traefik.http.routers.navidrome-local.entrypoints: websecure
      traefik.http.routers.navidrome-local.service: navidrome
      traefik.http.routers.navidrome-local.tls: true
      runtipi.managed: true